{% extends "base.html" %}
{% load static %}

{% block title %}Vérification QR Supporteur - FC Saint Eloi Lupopo{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center bg-gray-50 py-12 px-4 relative z-0">
  
  <!-- Abstract Design -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-[-1]">
      <div class="absolute top-0 right-0 w-1/3 h-1/3 bg-blue-50/50 rounded-bl-full"></div>
      <div class="absolute bottom-0 left-0 w-1/4 h-1/4 bg-yellow-50/50 rounded-tr-full"></div>
  </div>

  <div class="w-full max-w-lg">
    
    <div class="text-center mb-8">
      <a href="{% url 'profile' request.user.id|default:'' %}" class="inline-flex items-center text-sm font-bold text-gray-500 hover:text-lupopo-blue transition-colors group mb-4">
          <i class="fas fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> Retour
      </a>
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight flex justify-center items-center">
        <i class="fas fa-qrcode text-lupopo-blue mr-3"></i> Scan de Carte
      </h2>
      <p class="text-gray-600 mt-2">Placez le QR Code de la carte supporteur face à la caméra.</p>
    </div>

    <!-- Scanner Card -->
    <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 p-2 overflow-hidden mb-6 relative">
      <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-lupopo-blue via-lupopo-yellow to-lupopo-blue z-10"></div>
      
      <!-- Scanner Container -->
      <div class="rounded-2xl overflow-hidden bg-gray-900 relative min-h-[300px] flex items-center justify-center">
        <div id="qr-reader" class="w-full h-full border-0"></div>
        <!-- Loader that shows before camera initializes -->
        <div id="scanner-loader" class="absolute inset-0 flex flex-col items-center justify-center text-white/50 pointer-events-none">
          <i class="fas fa-camera text-4xl mb-3 opacity-20"></i>
          <span class="text-sm font-medium tracking-widest uppercase">Initialisation...</span>
        </div>
      </div>
    </div>
    
    <!-- Dynamic Result Box -->
    <div id="result" class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 hidden transform transition-all duration-300 translate-y-4 opacity-0">
      <!-- Injected via JS -->
    </div>

  </div>
</div>

<style>
  /* Customize html5-qrcode standard UI */
  #qr-reader { border: none !important; }
  #qr-reader__scan_region { background: #111827; }
  #qr-reader__dashboard { padding: 15px !important; background: white; text-align: center; }
  #qr-reader__dashboard_section_csr button {
    background-color: #0033a0;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s;
    margin-top: 10px;
  }
  #qr-reader__dashboard_section_csr button:hover { background-color: #002270; }
  #qr-reader__dashboard_section_swaplink { color: #0033a0; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px; }
  #qr-reader a { color: #0033a0; }
  #qr-reader video { border-radius: 16px; object-fit: cover; }
</style>

<script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
<script>
function onScanSuccess(decodedText) {
    // Hide scanner and loader
    document.getElementById("qr-reader").style.display = "none";
    document.getElementById("scanner-loader").style.display = "none";
    
    // Extract numero_supporteur
    let url = new URL(decodedText);
    let numero = url.searchParams.get("numero");

    html5QrcodeScanner.clear().then(_ => {
        
        let resultDiv = document.getElementById("result");
        resultDiv.classList.remove("hidden");
        // Trigger animation
        setTimeout(() => {
          resultDiv.classList.remove("translate-y-4", "opacity-0");
        }, 50);

        resultDiv.innerHTML = `
          <div class="flex flex-col items-center justify-center py-8">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-lupopo-blue rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-500 font-medium">Vérification en cours...</p>
          </div>
        `;

        fetch(`/supporteur/verifier-qr-ajax/?numero=${numero}`)
        .then(response => response.json())
        .then(data => {
            if(data.statut === "valide"){
                resultDiv.innerHTML = `
                  <div class="text-center">
                    <div class="w-20 h-20 mx-auto bg-green-100 text-green-500 rounded-full flex items-center justify-center text-4xl mb-4 shadow-inner ring-4 ring-green-50">
                      <i class="fas fa-check"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-1">Carte Valide</h3>
                    <div class="bg-gray-50 rounded-xl p-4 mt-4 border border-gray-100">
                      <p class="font-black text-lg text-lupopo-blue uppercase tracking-tight">${data.prenom} ${data.nom}</p>
                      <p class="text-sm font-bold text-gray-500 mt-1 font-mono">N° ${data.numero_supporteur}</p>
                    </div>
                  </div>
                  <button onclick="location.reload()" class="w-full mt-6 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition-colors">Scanner une autre carte</button>
                `;
            } else if(data.statut === "non_valide") {
                resultDiv.innerHTML = `
                  <div class="text-center">
                    <div class="w-20 h-20 mx-auto bg-red-100 text-red-500 rounded-full flex items-center justify-center text-4xl mb-4 shadow-inner ring-4 ring-red-50">
                      <i class="fas fa-times"></i>
                    </div>
                    <h3 class="text-xl font-bold text-red-600 mb-1">Carte Non Valide</h3>
                    <p class="text-gray-500 text-sm">Le statut de ce supporteur est inactif ou désactivé.</p>
                  </div>
                  <button onclick="location.reload()" class="w-full mt-6 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition-colors">Scanner une autre carte</button>
                `;
            } else {
                resultDiv.innerHTML = `
                  <div class="text-center">
                    <div class="w-20 h-20 mx-auto bg-gray-100 text-gray-400 rounded-full flex items-center justify-center text-4xl mb-4 shadow-inner ring-4 ring-gray-50">
                      <i class="fas fa-question"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-1">Carte Inconnue</h3>
                    <p class="text-gray-500 text-sm">Ce numéro ne correspond à aucun profil dans la base de données.</p>
                  </div>
                  <button onclick="location.reload()" class="w-full mt-6 bg-lupopo-blue hover:bg-blue-800 text-white font-bold py-3 rounded-xl transition-colors">Réessayer</button>
                `;
            }
        });
    });
}

function onScanError(errorMessage) { 
  // Hide loader if camera starts scanning means it's ready
  document.getElementById("scanner-loader").style.display = "none";
}

var html5QrcodeScanner = new Html5Qrcode("qr-reader");
html5QrcodeScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess,
    onScanError
).catch((err) => {
  document.getElementById("scanner-loader").innerHTML = `
    <i class="fas fa-video-slash text-4xl mb-3 text-red-400"></i>
    <span class="text-sm font-medium tracking-wider text-red-300 text-center px-4">Accès caméra refusé ou non disponible.</span>
  `;
});
</script>
{% endblock %}
